name: Daily PropertyGuru Scrape

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - run: pip install requests
      
      - env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
        run: |
          python scraper.py || echo "Scraper returned error, continuing..."
        continue-on-error: true
      
      - run: |
          git config user.name "Bot"
          git config user.email "bot@local"
          git add data/
          git diff --cached --quiet || (git commit -m "update $(date +%Y-%m-%d)" && git push)
        continue-on-error: true
